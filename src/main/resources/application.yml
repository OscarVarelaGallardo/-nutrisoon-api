spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nutrisoon
    username: nutrisoon_user
    password: nutrisoon_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:

  port: 8080